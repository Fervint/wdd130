<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionário de HTML e CSS</title>
  <link rel="stylesheet" href="estilos/questionario.css">
</head>
<body>
  <header>
    <h1>Questionário de HTML e CSS</h1>
  </header>

  <main>
    <form>
      <label for="q1">1. O que significa a sigla CSS?</label>
      <input type="text" id="q1" name="q1" required>

      <label for="q2">2. Como os atributos <code>id</code> e <code>class</code> são selecionados no CSS?</label>
      <textarea id="q2" name="q2" rows="3" required></textarea>

      <label for="q3">3. Qual das opções abaixo é um comentário CSS válido?</label>
      <select id="q3" name="q3" required>
        <option value="" selected disabled>Escolha uma...</option>
        <option value="opcao1">/* Comentário CSS */</option>
        <option value="opcao2">// Comentário incorreto</option>
        <option value="opcao3"><!-- Comentário HTML --></option>
      </select>

      <label for="q4">4. Qual é a margem inferior dada por esta declaração?</label>
      <pre>margin: 10px 5px 15px;</pre>
      <input type="text" id="q4" name="q4" required>

      <button type="submit">ENVIAR QUESTIONÁRIO</button>
    </form>
  </main>

  <footer>
    <p><strong>Questionário feito por Fabio</strong></p>
    <p>Agradeçemos sua participação!</p>
  </footer>
</body>
</html>
