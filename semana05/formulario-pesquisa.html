<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário HTML - Enquete do Usuário</title>
</head>
<body>
  <h1>WDD 130 | Formulário HTML - Enquete do Usuário</h1>

  <form>
    <fieldset>
      <legend>Informações de Contato</legend>
      <div class="item-formulario coluna2">
  <label for="nomecompleto">Nome Completo:</label>
  <input type="text" id="nomecompleto" name="nomecompleto">
</div>
<div class="item-formulario coluna2">
  <label for="emaildousuario">E-mail:</label>
  <input type="email" id="emaildousuario" name="emaildousuario">
</div>
    </fieldset>

    <fieldset>
      <legend>Perguntas</legend>
      <label for="quantidade">Selecione a Quantidade:</label>
      <select name="quantidade" id="quantidade">
        <option value="1">Um</option>
        <option value="2">Dois</option>
        <option value="3">Três</option>
      </select>

      <label for="navegador">Qual é o seu navegador de internet favorito?</label>
      <select id="navegador" name="navegador">
        <option value="chrome">Chrome</option>
        <option value="firefox">Firefox</option>
        <option value="edge">Edge</option>
        <option value="brave">Brave</option>
        <option value="other">Outro</option>
      </select>

      <label for="pet">Você tem um bichinho de estimação?</label>
      <input type="checkbox" id="pet" name="pet">

      <label for="feedback">Liste os lugares onde você morou:</label>
      <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Flórida, Amsterdam Holanda, Timbuktu Mali"></textarea>
    </fieldset>

    <button type="submit">Enviar Enquete</button>
  </form>

  <footer>
    <p>©2025 | Formulário HTML - Atividade de Enquete do Usuário | Fabio Ricardo </p>
  </footer>

  <p><em>Exemplo de página de formulário de pesquisa. Observe que isso não é estilizado, apenas uma estrutura HTML.</em></p>
</body>
</html>
